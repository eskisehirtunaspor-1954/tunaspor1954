version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tunaspor_web
    restart: unless-stopped
    env_file: .env.local
    expose:
      - "3000"
    networks:
      - tunaspor_net

  nginx:
    image: nginx:1.27-alpine
    container_name: tunaspor_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - tunaspor_net

networks:
  tunaspor_net:
    driver: bridge
