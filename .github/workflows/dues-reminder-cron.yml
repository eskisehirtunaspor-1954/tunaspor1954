name: Aidat Hatırlatma Cron

on:
  schedule:
    # Her gün 07:00 UTC (Türkiye saatiyle 10:00) — vadesi geçmiş aidatları tarar.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Cron endpoint'ini tetikle
        run: |
          curl -sf -X POST "${{ secrets.SITE_URL }}/api/cron/dues-reminder" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
