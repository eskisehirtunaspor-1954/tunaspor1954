name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx kur
        uses: docker/setup-buildx-action@v3

      - name: Container registry'e giriş yap
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            env_file=${{ secrets.ENV_LOCAL_FILE }}

  # Sunucuya SSH ile bağlanıp docker compose pull + up yapan adım.
  # SSH_HOST / SSH_USER / SSH_PRIVATE_KEY secret'ları repo ayarlarından eklenmelidir.
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH secret kontrolü
        id: check
        run: |
          if [ -n "${{ secrets.SSH_HOST }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sunucuda dağıtımı tetikle
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/tunaspor1954
            docker compose pull
            docker compose up -d --remove-orphans
